<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Fatoura{% endblock %}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%2316161a'/><text x='50' y='71' font-size='62' font-family='sans-serif' font-weight='900' fill='white' text-anchor='middle'>F</text></svg>">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <span class="brand">FATOURA</span>
    <nav>
      <a href="{{ url_for('index') }}" class="{{ 'active' if active == 'invoices' }}">Factures</a>
      <a href="{{ url_for('new_invoice') }}" class="{{ 'active' if active == 'new' }}">Nouvelle facture</a>
      <a href="{{ url_for('clients_page') }}" class="{{ 'active' if active == 'clients' }}">Clients</a>
      <a href="{{ url_for('services_page') }}" class="{{ 'active' if active == 'services' }}">Services</a>
      <a href="{{ url_for('settings') }}" class="{{ 'active' if active == 'settings' }}">Paramètres</a>
    </nav>
  </header>
  <main>
    {% with messages = get_flashed_messages() %}
      {% for message in messages %}
        <div class="banner">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
